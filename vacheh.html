<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacheh | Modern Burg</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold: #d39755;
      --brown: #a57b5e;
      --text: #4a3a2f;
      --bg: #f7f3ef;
      --card: #ffffff;
      --line: #eadfd4;
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin:0;
      font-family:'DM Sans', Arial, sans-serif;
      background: linear-gradient(180deg, #fbf8f5 0%, #f3ece5 100%);
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(102, 75, 48, 0.14);
      border:1px solid rgba(165, 123, 94, 0.12);
    }

    .top{
      background: linear-gradient(135deg, rgba(211,151,85,0.18), rgba(165,123,94,0.18));
      padding:28px 28px 20px;
      text-align:center;
      border-bottom:1px solid var(--line);
    }

    .logo{
      width:220px;
      max-width:100%;
      height:auto;
      display:block;
      margin:0 auto 18px;
    }

    .name{
      font-size:35px;
      line-height:1.1;
      margin:0;
      color:var(--brown);
      letter-spacing:0.02em;
    }

    .title{
      margin:10px 0 0;
      font-size:30px;
      color:#7a6758;
      font-weight:550;
    }

    .company{
      margin:6px 0 0;
      font-size:14px;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--gold);
      font-weight:700;
    }

    .content{
      padding:24px;
    }

    .info-box{
      background:#fcfaf8;
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px 0;
      margin-bottom:20px;
    }

    .info-row{
      padding:14px 18px;
      border-bottom:1px solid var(--line);
    }

    .info-row:last-child{
      border-bottom:none;
    }

    .label{
      display:block;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:var(--gold);
      margin-bottom:6px;
      font-weight:700;
    }

    .value,
    .value a{
      font-size:16px;
      color:var(--text);
      text-decoration:none;
      word-break:break-word;
    }

    .buttons{
      display:grid;
      gap:12px;
    }

    .button{
      display:block;
      text-align:center;
      text-decoration:none;
      padding:15px 18px;
      border-radius:14px;
      font-family:'Montserrat', Arial, sans-serif;
      font-weight:700;
      font-size:15px;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover{
      transform:translateY(-1px);
    }

    .primary{
      background:var(--gold);
      color:white;
      box-shadow:0 10px 20px rgba(211,151,85,0.25);
    }

    .secondary{
      background:var(--brown);
      color:white;
      box-shadow:0 10px 20px rgba(165,123,94,0.22);
    }

    .outline{
      background:white;
      color:var(--brown);
      border:1.5px solid var(--brown);
    }

    .footer{
      text-align:center;
      font-size:12px;
      color:#9a8676;
      padding:0 24px 24px;
    }

    @media (max-width:480px){
      .name{
        font-size:30px;
      }

      .top{
        padding:24px 20px 18px;
      }

      .content{
        padding:20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img src="/logo.png" alt="Modernburg logo" class="logo">
      <h1 class="name">Vacheh Markarian</h1>
      <p class="title">CEO</p>
    </div>

    <div class="content">
      <div class="info-box">
        <div class="info-row">
          <span class="label">Phone</span>
          <span class="value"><a href="tel:+8183347074">(818) 334-7074</a></span>
        </div>

        <div class="info-row">
          <span class="label">Email</span>
          <span class="value"><a href="mailto:vacheh@modernburg.com">vacheh@modernburg.com</a></span>
        </div>

        <div class="info-row">
          <span class="label">Address</span>
          <span class="value">
            <a href="https://maps.google.com/?q=123+Company+Address+St+City+State+ZIP" target="_blank">
              120 W Providencia Ave, Burbank, CA 91502
            </a>
          </span>
        </div>
      </div>

      <div class="buttons">
        <a class="button primary" href="vacheh.vcf">Add Contact</a>
        <a class="button secondary" href="tel:+8183347074">Call</a>
        <a class="button outline" href="mailto:vacheh@modernburg.com">Email</a>
      </div>
    </div>

    <div class="footer">
      Modern Burg digital contact card
    </div>
  </div>
</body>
</html>
