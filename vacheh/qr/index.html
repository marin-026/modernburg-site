<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan to save Vacheh Markarian | Modern Burg</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'DM Sans', sans-serif;
background:linear-gradient(180deg,#fbf8f5,#f3ece5);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:22px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
max-width:420px;
width:90%;
}

.logo{
width:200px;
margin-bottom:20px;
}

.name{
font-family:'Montserrat', sans-serif;
font-size:32px;
color:#a57b5e;
margin:10px 0 4px;
}

.title{
color:#7a6758;
margin-bottom:20px;
}

.qr{
width:260px;
max-width:100%;
margin:10px auto 20px;
}

.scan{
font-size:14px;
color:#d39755;
font-weight:600;
letter-spacing:0.1em;
text-transform:uppercase;
}
</style>
</head>

<body>

<div class="card">

<img src="/logo.png" class="logo">

<div class="name">Vacheh LastName</div>
<div class="title">CEO</div>

<img src="/vacheh-qr.png" class="qr">

<div class="scan">Scan to save contact</div>

</div>

</body>
</html>
